services:
  app:
    image: php:8.3-fpm
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      - db

  web:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ./:/var/www/html
    depends_on:
      - app

  db:
    image: mysql:8
    environment:
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  antigravity-manager:
    image: lbjlaq/antigravity-manager:latest
    ports:
      - "8045:8045"
    environment:
      API_KEY: sk-local-dev-123
      WEB_PASSWORD: admin123
      PORT: 8045
    volumes:
      - ./antigravity-manager/antigravity_data:/root/.antigravity_tools
    restart: unless-stopped

  test:
    image: php:8.3-cli
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: ["/usr/local/bin/composer", "install", "&&", "vendor/bin/phpunit"]
    depends_on:
      - db

volumes:
  db_data:
